<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>modal</title>
  <link rel="stylesheet" href="index.css">
  <script src="index.js" defer></script>
</head>

<body>
  <button id="openModalButton">Open Modal</button>
  <form id="form">
    <div id="modal">
      <button id="close"> X </button>
      <h2>Modal Title</h2>
      <p>This is a simple modal dialog with keyboard navigation.</p>
      <label for="input1"></label>
      <input type="text" id="input1" class="input" placeholder="Input field 1" required>
      <label for="input2"></label>
      <input type="text" id="input2" placeholder="Input field 2" required><br>
      <button id="submit">Submit</button>
    </div>
  </form>
</body>

</html>
